# dev 环境：region 连接占位，实际由本地或测试环境填充
regions:
  singapore:
    mysql:
      business: { jdbc-url: jdbc:mysql://localhost:3306/sg_biz, username: ENC(placeholder), password: ENC(placeholder) }
    redis: { host: localhost, port: 6379, password: ENC(placeholder) }
    elasticsearch: { hosts: localhost:9200, credentials: ENC(placeholder) }
    s3: { endpoint: http://localhost:9000, bucket: sg-bucket, access-key: ENC(placeholder), secret-key: ENC(placeholder) }
    dynamodb: { endpoint: http://localhost:8000, region: ap-southeast-1, access-key: ENC(placeholder), secret-key: ENC(placeholder) }
    kafka: { brokers: localhost:9092, topic-prefix: singapore }
  myanmar:
    mysql:
      business: { jdbc-url: jdbc:mysql://localhost:3306/mm_biz, username: ENC(placeholder), password: ENC(placeholder) }
    redis: { host: localhost, port: 6380, password: ENC(placeholder) }
    elasticsearch: { hosts: localhost:9201, credentials: ENC(placeholder) }
    s3: { endpoint: http://localhost:9000, bucket: mm-bucket, access-key: ENC(placeholder), secret-key: ENC(placeholder) }
    dynamodb: { endpoint: http://localhost:8000, region: ap-southeast-1, access-key: ENC(placeholder), secret-key: ENC(placeholder) }
    kafka: { brokers: localhost:9092, topic-prefix: myanmar }
