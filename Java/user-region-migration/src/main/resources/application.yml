# 公共配置（所有 profile 共享）
spring:
  application:
    name: user-region-migration
  main:
    # Spring Shell 为交互式 CLI，关闭 web 服务器
    web-application-type: none
  shell:
    interactive:
      # 默认禁用交互式 REPL（避免测试/脚本场景阻塞等待 stdin）。
      # 生产交互模式通过启动参数 --spring.shell.interactive.enabled=true 启用。
      enabled: false

# 迁移框架默认参数
migration:
  default-batch-size: 50              # 进度汇报粒度（每完成 N 个租户打一次日志）
  default-threads: 4                  # 租户级并发度
  rate-limit-qps: 500                 # 进程级单一全局 QPS
  retry:
    max-attempts: 3
    backoff-initial: 1s

# Jasypt 主密钥必须通过环境变量 JASYPT_MASTER_PASSWORD 注入。
# 不设默认值：生产忘配会启动失败（fail-fast），优于静默用弱密钥。
jasypt:
  encryptor:
    password: ${JASYPT_MASTER_PASSWORD}
