syntax = "proto3";

package kratos.demo.internal.conf;

option go_package = "kratos-demo/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  message GRPC {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

// Data 数据层配置(数据库连接等)
message Data {
  message Database {
    // 数据库驱动,例如 mysql
    string driver = 1;
    // 数据源 DSN,支持 ${ENV_VAR} 形式的环境变量占位,避免明文密码入库
    string source = 2;
  }
  Database database = 1;
}
