# buf.gen.yaml - buf 代码生成配置
# 文档: https://buf.build/docs/configuration/v2/buf-gen-yaml
version: v2
plugins:
  # 生成 Go 消息结构体 (.pb.go)
  - local: protoc-gen-go
    out: .
    opt: paths=source_relative
  # 生成 gRPC 服务代码 (_grpc.pb.go)
  - local: protoc-gen-go-grpc
    out: .
    opt: paths=source_relative
  # 生成 kratos HTTP 路由代码 (_http.pb.go)
  - local: protoc-gen-go-http
    out: .
    opt: paths=source_relative
